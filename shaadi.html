<!DOCTYPE html>
<html>
<head>
    <title>Shaadi.com Profile Form</title>
</head>
<body>

    <h1>💍 Shaadi.com Profile Form</h1>
    <hr>

    <form>

        <h3>Personal Details</h3>

        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter your name"><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date"><br><br>

        <label>City:</label><br>
        <input type="text" placeholder="Enter your city"><br><br>

        <h3>Gender</h3>

        <input type="radio" name="gender"> Male<br>
        <input type="radio" name="gender"> Female<br>
        <input type="radio" name="gender"> Other<br><br>

        <h3>Interests</h3>

        <input type="checkbox"> Reading<br>
        <input type="checkbox"> Music<br>
        <input type="checkbox"> Traveling<br>
        <input type="checkbox"> Cooking<br><br>

        <h3>Upload Profile Photo</h3>

        <input type="file"><br><br>

        <label>About Me:</label><br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Create Profile">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
